# Streamlit 서버 설정
[server]
websocketPingInterval = 30
maxUploadSize = 200

[theme]
# ── Soft Indigo Pastel Theme ──
primaryColor             = "#7B6FE8"   # 소프트 인디고
backgroundColor          = "#F8F7FF"   # 고스트 화이트 (라벤더 힌트)
secondaryBackgroundColor = "#EDEAFF"   # 라이트 라벤더 (사이드바·카드)
textColor                = "#2E2B5A"   # 딥 인디고 네이비
font                     = "sans serif"
